      .t2  { fill: rgba(4,52,44,0.25); stroke: #1D9E75; }
      .t3  { fill: rgba(38,33,92,0.25); stroke: #7F77DD; }
      .tlb { fill: #252523; stroke: #444441; }
      .tx-p { fill: #e8e6de; }
      .tx-s { fill: #9c9a92; }
      .an   { stroke: #5f5e5a; }
      .raw  { fill: #2e2e2c; stroke: #888780; }
      .os   { fill: #042C53; stroke: #378ADD; }
      .co   { fill: #185FA5; stroke: #85B7EB; }
      .rs   { fill: #3C3489; stroke: #AFA9EC; }
      .qos  { fill: #04342C; stroke: #5DCAA5; }
      .qco  { fill: #085041; stroke: #9FE1CB; }
      .sos  { fill: #26215C; stroke: #7F77DD; }
      .sco  { fill: #3C3489; stroke: #AFA9EC; }
      .tr   { fill: #D3D1C7; }
      .to   { fill: #B5D4F4; }
      .tc   { fill: #e8e6de; }
      .trs  { fill: #CECBF6; }
      .tq   { fill: #9FE1CB; }
      .tqc  { fill: #e8e6de; }
      .ts   { fill: #AFA9EC; }
      .tsc  { fill: #CECBF6; }
      .msd  { stroke: #7F77DD; fill: none; }
      .lgo  { fill: #042C53; stroke: #378ADD; }
      .lgc  { fill: #185FA5; stroke: #85B7EB; }
      .lgr  { fill: #3C3489; stroke: #AFA9EC; }
    }
    @media (prefers-color-scheme: light) {
      .t0  { fill: #F1EFE8; stroke: #D3D1C7; }
      .t1  { fill: rgba(230,241,251,0.7); stroke: #B5D4F4; }
      .t2  { fill: rgba(225,245,238,0.7); stroke: #9FE1CB; }
      .t3  { fill: rgba(238,237,254,0.7); stroke: #CECBF6; }
      .tlb { fill: #ffffff; stroke: #D3D1C7; }
      .tx-p { fill: #1a1a1a; }
      .tx-s { fill: #5f5e5a; }
      .an   { stroke: #B4B2A9; }
      .raw  { fill: #F8F7F3; stroke: #888780; }
      .os   { fill: #E6F1FB; stroke: #185FA5; }
      .co   { fill: #85B7EB; stroke: #185FA5; }
      .rs   { fill: #EEEDFE; stroke: #7F77DD; }
      .qos  { fill: #E1F5EE; stroke: #0F6E56; }
      .qco  { fill: #5DCAA5; stroke: #0F6E56; }
      .sos  { fill: #EEEDFE; stroke: #7F77DD; }
      .sco  { fill: #AFA9EC; stroke: #534AB7; }
      .tr   { fill: #2C2C2A; }
      .to   { fill: #0C447C; }
      .tc   { fill: #042C53; }
      .trs  { fill: #3C3489; }
      .tq   { fill: #085041; }
      .tqc  { fill: #04342C; }
      .ts   { fill: #3C3489; }
      .tsc  { fill: #26215C; }
      .msd  { stroke: #534AB7; fill: none; }
      .lgo  { fill: #E6F1FB; stroke: #185FA5; }
      .lgc  { fill: #85B7EB; stroke: #185FA5; }
      .lgr  { fill: #EEEDFE; stroke: #7F77DD; }
    }
    .lbl { font: 500 12px "Helvetica Neue", Arial, sans-serif; }
    .sub { font: 400 10px "Helvetica Neue", Arial, sans-serif; }
    .tier{ font: 500 10px "Helvetica Neue", Arial, sans-serif; }
  </style>
</defs>

<!-- ── Tier 0: Raw data (y=8..82) ── -->
<rect x="16" y="8"  width="648" height="74" rx="6" class="t0" stroke-width="0.5" opacity="0.9"/>
<!-- Tier label — positioned top-left, clear of boxes -->
<rect x="20" y="12" width="54" height="16" rx="3" class="tlb" stroke-width="0.3"/>
<text class="tier tx-s" x="47" y="23" text-anchor="middle">raw data</text>

<rect x="90"  y="18" width="148" height="56" rx="7" class="raw" stroke-width="0.5"/>
<text class="lbl tr" x="164" y="38" text-anchor="middle">.raw / .d / .wiff</text>
<text class="sub tx-s" x="164" y="52" text-anchor="middle">vendor binary formats</text>
<text class="sub tx-s" x="164" y="64" text-anchor="middle">Thermo · Bruker · SCIEX</text>

<line x1="240" y1="46" x2="286" y2="46" class="an" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="sub tx-s" x="263" y="40" text-anchor="middle">convert</text>

<rect x="288" y="18" width="148" height="56" rx="7" class="raw" stroke-width="0.5"/>
<text class="lbl tr" x="362" y="38" text-anchor="middle">mzML / mzXML</text>
<text class="sub tx-s" x="362" y="52" text-anchor="middle">open format</text>
<text class="sub tx-s" x="362" y="64" text-anchor="middle">ProteoWizard msConvert</text>

<!-- ── Tier 1: Identification (y=90..208) ── -->
<rect x="16" y="90" width="648" height="118" rx="6" class="t1" stroke-width="0.5"/>
<!-- Tier label clear of first box -->
<rect x="20" y="94" width="72" height="16" rx="3" class="tlb" stroke-width="0.3"/>
<text class="tier tx-s" x="56" y="105" text-anchor="middle">identification</text>

<!-- 5 boxes: MaxQuant, MSFragger, DIA-NN, Spectronaut, Oktoberfest -->
<!-- x positions: 20, 146, 272, 398, 524 — width 118 each with 8px gaps -->
<rect x="20"  y="108" width="118" height="58" rx="6" class="os" stroke-width="0.5"/>
<text class="lbl to" x="79" y="128" text-anchor="middle">MaxQuant</text>
<text class="sub tx-s" x="79" y="142" text-anchor="middle">DDA · Andromeda</text>
<text class="sub tx-s" x="79" y="154" text-anchor="middle">open source</text>

<rect x="146" y="108" width="118" height="58" rx="6" class="os" stroke-width="0.5"/>
<text class="lbl to" x="205" y="128" text-anchor="middle">MSFragger/FragPipe</text>
<text class="sub tx-s" x="205" y="142" text-anchor="middle">DDA + DIA · open</text>
<text class="sub tx-s" x="205" y="154" text-anchor="middle">open source</text>

<rect x="272" y="108" width="118" height="58" rx="6" class="os" stroke-width="0.5"/>
<text class="lbl to" x="331" y="128" text-anchor="middle">DIA-NN 2.0</text>
<text class="sub tx-s" x="331" y="142" text-anchor="middle">DIA · neural network</text>
<text class="sub tx-s" x="331" y="154" text-anchor="middle">open source</text>

<rect x="398" y="108" width="118" height="58" rx="6" class="co" stroke-width="1"/>
<text class="lbl tc" x="457" y="128" text-anchor="middle">Spectronaut</text>
<text class="sub tx-s" x="457" y="142" text-anchor="middle">DIA · directDIA</text>
<text class="sub tx-s" x="457" y="154" text-anchor="middle">commercial</text>

<!-- Oktoberfest — positioned right, labelled "rescoring" above -->
<text class="tier tx-s" x="584" y="104" text-anchor="middle">rescoring</text>
<rect x="524" y="108" width="124" height="58" rx="6" class="rs" stroke-width="0.5"/>
<text class="lbl trs" x="586" y="128" text-anchor="middle">Oktoberfest</text>
<text class="sub tx-s" x="586" y="142" text-anchor="middle">DL rescoring</text>
<text class="sub tx-s" x="586" y="154" text-anchor="middle">post-search · open</text>

<!-- Arrows raw → search (from bottom of raw tier to top of id tier) -->
<line x1="164" y1="74" x2="100" y2="106" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="280" y1="60" x2="205" y2="106" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="362" y1="74" x2="331" y2="106" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="436" y1="58" x2="457" y2="106" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<!-- Rescoring dashed from MSFragger -->
<line x1="264" y1="137" x2="522" y2="137" stroke="#7F77DD" stroke-width="0.8"
  stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- ── Tier 2: Quantification (y=216..296) ── -->
<rect x="16" y="216" width="648" height="80" rx="6" class="t2" stroke-width="0.5"/>
<rect x="20" y="220" width="82" height="16" rx="3" class="tlb" stroke-width="0.3"/>
<text class="tier tx-s" x="61" y="231" text-anchor="middle">quantification</text>

<rect x="20"  y="234" width="118" height="52" rx="6" class="qos" stroke-width="0.5"/>
<text class="lbl tq" x="79" y="252" text-anchor="middle">MaxLFQ (MaxQuant)</text>
<text class="sub tx-s" x="79" y="266" text-anchor="middle">LFQ · DDA + SILAC + TMT</text>
<text class="sub tx-s" x="79" y="278" text-anchor="middle">open source</text>

<rect x="146" y="234" width="118" height="52" rx="6" class="qos" stroke-width="0.5"/>
<text class="lbl tq" x="205" y="252" text-anchor="middle">IonQuant (FragPipe)</text>
<text class="sub tx-s" x="205" y="266" text-anchor="middle">LFQ + MBR · DDA + DIA</text>
<text class="sub tx-s" x="205" y="278" text-anchor="middle">open source</text>

<rect x="272" y="234" width="118" height="52" rx="6" class="qos" stroke-width="0.5"/>
<text class="lbl tq" x="331" y="252" text-anchor="middle">DIA-NN (quant)</text>
<text class="sub tx-s" x="331" y="266" text-anchor="middle">XIC-based · DIA only</text>
<text class="sub tx-s" x="331" y="278" text-anchor="middle">open source</text>

<rect x="398" y="234" width="118" height="52" rx="6" class="qco" stroke-width="1"/>
<text class="lbl tqc" x="457" y="252" text-anchor="middle">Spectronaut (quant)</text>
<text class="sub tx-s" x="457" y="266" text-anchor="middle">XIC-based · DIA only</text>
<text class="sub tx-s" x="457" y="278" text-anchor="middle">commercial</text>

<!-- Arrows id → quant -->
<line x1="79"  y1="166" x2="79"  y2="232" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="205" y1="166" x2="205" y2="232" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="331" y1="166" x2="331" y2="232" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="457" y1="166" x2="457" y2="232" class="an" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- MS-DAP label in the GAP between tier 2 and tier 3 -->
<!-- Gap is y=298..318 — place label at y=312, arrows route below at y=310..328 -->
<text class="sub ts" x="300" y="310" text-anchor="middle"
  style="font-style:italic;">
  MS-DAP accepts output from all search engines
</text>

<!-- ── Tier 3: Statistics (y=320..412) ── -->
<rect x="16" y="320" width="648" height="92" rx="6" class="t3" stroke-width="0.5"/>
<rect x="20" y="324" width="58" height="16" rx="3" class="tlb" stroke-width="0.3"/>
<text class="tier tx-s" x="49" y="335" text-anchor="middle">statistics</text>

<!-- MS-DAP — starts at x=20, wider box, highlighted border -->
<rect x="20" y="338" width="138" height="66" rx="6" class="sos" stroke-width="1.8"/>
<text class="lbl ts" x="89" y="358" text-anchor="middle">MS-DAP</text>
<text class="sub tx-s" x="89" y="372" text-anchor="middle">any input · R package</text>
<text class="sub tx-s" x="89" y="385" text-anchor="middle">DEqMS · MSqRob · limma</text>
<text class="sub ts" x="89" y="398" text-anchor="middle">open source</text>

<rect x="168" y="338" width="130" height="66" rx="6" class="sos" stroke-width="0.5"/>
<text class="lbl ts" x="233" y="358" text-anchor="middle">Perseus</text>
<text class="sub tx-s" x="233" y="372" text-anchor="middle">MaxQuant output</text>
<text class="sub tx-s" x="233" y="385" text-anchor="middle">open source</text>

<rect x="308" y="338" width="130" height="66" rx="6" class="sos" stroke-width="0.5"/>
<text class="lbl ts" x="373" y="358" text-anchor="middle">FragPipe-Analyst</text>
<text class="sub tx-s" x="373" y="372" text-anchor="middle">FragPipe output</text>
<text class="sub tx-s" x="373" y="385" text-anchor="middle">open source</text>

<rect x="448" y="338" width="130" height="66" rx="6" class="sco" stroke-width="1"/>
<text class="lbl tsc" x="513" y="358" text-anchor="middle">Spectronaut (stats)</text>
<text class="sub tx-s" x="513" y="372" text-anchor="middle">built-in testing</text>
<text class="sub tx-s" x="513" y="385" text-anchor="middle">commercial</text>

<!-- Arrows quant → stats (straight, land in stat boxes) -->
<line x1="79"  y1="286" x2="79"  y2="336" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="205" y1="286" x2="233" y2="336" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="331" y1="286" x2="373" y2="336" class="an" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="457" y1="286" x2="513" y2="336" class="an" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- MS-DAP curved dashed arrows from other quant outputs -->
<!-- These route BELOW the "MS-DAP accepts" label (which is at y=310) -->
<!-- Arc from IonQuant centre x=205, curving to MS-DAP right edge x=158 -->
<path d="M205 286 C205 318 160 330 90 336"
  class="msd" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<path d="M331 286 C331 316 240 328 90 338"
  class="msd" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<path d="M457 286 C457 316 320 328 90 340"
  class="msd" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- ── Legend (y=422..450) ── -->
<rect x="16" y="420" width="648" height="36" rx="6" class="t0" stroke-width="0.5" opacity="0.9"/>
<rect x="30" y="430" width="12" height="12" rx="2" class="lgo" stroke-width="0.5"/>
<text class="sub tx-s" x="48" y="439">Open source</text>
<rect x="148" y="430" width="12" height="12" rx="2" class="lgc" stroke-width="1"/>
<text class="sub tx-s" x="166" y="439">Commercial</text>
<rect x="266" y="430" width="12" height="12" rx="2" class="lgr" stroke-width="0.5"/>
<text class="sub tx-s" x="284" y="439">Post-search rescoring</text>
<line x1="416" y1="436" x2="444" y2="436" stroke="#7F77DD" stroke-width="0.9" stroke-dasharray="4 3"/>
<text class="sub tx-s" x="450" y="439">Accepts any input</text>

<!-- ── Notes (y=464..516) ── -->
<rect x="16" y="462" width="648" height="56" rx="6" class="t0" stroke-width="0.5" opacity="0.6"/>
<text class="sub tx-s" x="340" y="479" text-anchor="middle">DEqMS and MSqRob are R packages integrated within MS-DAP. Skyline (targeted / PRM) and PEAKS Studio (de novo)</text>
<text class="sub tx-s" x="340" y="494" text-anchor="middle">operate across tiers and are not shown. Perseus is the standard companion for MaxQuant; FragPipe-Analyst</text>
<text class="sub tx-s" x="340" y="509" text-anchor="middle">is bundled with FragPipe. MS-DAP accepts output from MaxQuant, DIA-NN, FragPipe, Spectronaut, and Skyline.</text>
</svg>
