<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .panel-hd  { fill: #e8e6de; }
      .frame     { fill: none; stroke: rgba(222,220,209,0.25); }
      .sub-lbl   { fill: #9c9a92; }
      .sum-box   { fill: none; stroke: rgba(222,220,209,0.20); }
      .sum-hd    { fill: #e8e6de; }
      .sum-txt   { fill: #9c9a92; }
      .divider   { stroke: rgba(222,220,209,0.18); }
      .exc-fill  { fill: rgba(100,160,240,0.20); stroke: #64A0F0; }
      .exc-lbl   { fill: #64A0F0; }
      .eff-fill  { fill: rgba(29,158,117,0.25); stroke: #1D9E75; }
      .eff-lbl   { fill: #1D9E75; }
      .sted-fill { fill: rgba(226,75,74,0.20); stroke: #E24B4A; }
      .sted-lbl  { fill: #E24B4A; }
      .fl-on     { fill: #5DCAA5; }
      .fl-dim    { fill: rgba(29,158,117,0.25); stroke: #1D9E75; }
      .cell-bg   { fill: rgba(100,160,240,0.04); stroke: rgba(100,160,240,0.20); }
      .memb-fill { fill: rgba(222,220,209,0.07); stroke: rgba(222,220,209,0.30); }
      .tm-fill   { fill: rgba(222,220,209,0.10); stroke: rgba(222,220,209,0.35); }
      .comp-box  { fill: rgba(222,220,209,0.05); stroke: rgba(222,220,209,0.28); }
      .arrow-proc { stroke: #9c9a92; }
      .ca-dot    { fill: #64A0F0; }
      .da-fill   { fill: rgba(226,75,74,0.30); stroke: #E24B4A; }
    }
    @media (prefers-color-scheme: light) {
      .panel-hd  { fill: #1a1a1a; }
      .frame     { fill: none; stroke: #D3D1C7; }
      .sub-lbl   { fill: #5f5e5a; }
      .sum-box   { fill: none; stroke: #D3D1C7; }
      .sum-hd    { fill: #1a1a1a; }
      .sum-txt   { fill: #5f5e5a; }
      .divider   { stroke: #D3D1C7; }
      .exc-fill  { fill: rgba(40,100,200,0.10); stroke: #2864C8; }
      .exc-lbl   { fill: #2864C8; }
      .eff-fill  { fill: rgba(15,110,86,0.15); stroke: #0F6E56; }
      .eff-lbl   { fill: #0F6E56; }
      .sted-fill { fill: rgba(200,50,50,0.12); stroke: #C83232; }
      .sted-lbl  { fill: #C83232; }
      .fl-on     { fill: #0F6E56; }
      .fl-dim    { fill: rgba(15,110,86,0.15); stroke: #0F6E56; }
      .cell-bg   { fill: rgba(40,100,200,0.03); stroke: #C0CCE0; }
      .memb-fill { fill: rgba(0,0,0,0.04); stroke: #B8B6AC; }
      .tm-fill   { fill: rgba(0,0,0,0.06); stroke: #B0AEA6; }
      .comp-box  { fill: rgba(0,0,0,0.02); stroke: #C8C6BE; }
      .arrow-proc { stroke: #888780; }
      .ca-dot    { fill: #2864C8; }
      .da-fill   { fill: rgba(200,50,50,0.20); stroke: #C83232; }
    }
    .hd  { font: 600 13px "Helvetica Neue", Arial, sans-serif; }
    .lbl { font: 500 12px "Helvetica Neue", Arial, sans-serif; }
    .sub { font: 400 11px "Helvetica Neue", Arial, sans-serif; }
    .mono{ font: 400 10px "JetBrains Mono","Courier New",monospace; }
  </style>
  <marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- Glow filter for active cpGFP -->
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- TITLE -->
<text class="hd panel-hd" x="340" y="18" text-anchor="middle">Genetically Encoded Indicators — Sensing Mechanisms</text>

<!-- ══════════════════════════════
  LEFT PANEL: GCaMP  x=10..328
══════════════════════════════ -->
<rect x="10" y="26" width="318" height="420" rx="6" class="frame" stroke-width="0.5"/>
<text class="hd exc-lbl" x="169" y="47" text-anchor="middle">GCaMP</text>
<text class="sub sub-lbl" x="169" y="60" text-anchor="middle">intracellular Ca²⁺ sensor</text>

<!-- Membrane band (y=94..110, x=10..328) -->
<rect x="10" y="94" width="318" height="16" rx="0" class="memb-fill" stroke-width="0.8"/>
<!-- Lipid heads (small ovals on both surfaces) -->
<ellipse cx="26"  cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="42"  cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="58"  cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="74"  cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="90"  cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="106" cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="122" cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="138" cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="154" cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="170" cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="186" cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="202" cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="218" cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="234" cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="250" cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="266" cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="282" cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="298" cy="104" rx="6" ry="4" class="comp-box" stroke-width="0.6"/>
<ellipse cx="314" cy="97"  rx="6" ry="4" class="comp-box" stroke-width="0.6"/>

<!-- Space labels -->
<text class="sub sub-lbl" x="20" y="88"  style="font-size:9px;">extracellular</text>
<text class="sub sub-lbl" x="20" y="126" style="font-size:9px;">cytoplasm</text>

<!-- ── APO STATE (left, x≈65..145) ── -->
<text class="sub sub-lbl" x="100" y="142" text-anchor="middle" style="font-size:9px;">Ca²⁺-free (apo)</text>

<!-- cpGFP barrel — dim, dashed stroke -->
<ellipse cx="100" cy="205" rx="22" ry="28"
  class="fl-dim" stroke-width="1.4" stroke-dasharray="4 3"/>
<text class="sub sub-lbl" x="100" y="201" text-anchor="middle" style="font-size:9px;">cpGFP</text>
<text class="sub sub-lbl" x="100" y="213" text-anchor="middle" style="font-size:8.5px;">OFF</text>

<!-- CaM — extended, separate from M13 -->
<ellipse cx="100" cy="264" rx="16" ry="10" class="comp-box" stroke-width="1"/>
<text class="sub sub-lbl" x="100" y="268" text-anchor="middle" style="font-size:8.5px;">CaM</text>
<!-- M13 peptide (wavy, extended) -->
<path d="M82,282 Q92,290 102,284 Q112,278 122,286"
  fill="none" class="arrow-proc" stroke-width="1.5" stroke-linecap="round"/>
<text class="sub sub-lbl" x="100" y="302" text-anchor="middle" style="font-size:8px;">M13 peptide (extended)</text>

<text class="sub sub-lbl" x="100" y="322" text-anchor="middle" style="font-size:9px;">low fluorescence</text>

<!-- ── HOLO STATE (right, x≈200..285) ── -->
<text class="sub sub-lbl" x="240" y="142" text-anchor="middle" style="font-size:9px;">Ca²⁺-bound (holo)</text>

<!-- Ca²⁺ ions entering -->
<circle cx="225" cy="156" r="5" class="ca-dot" opacity="0.9"/>
<circle cx="240" cy="150" r="5" class="ca-dot" opacity="0.85"/>
<circle cx="255" cy="156" r="5" class="ca-dot" opacity="0.80"/>
<text class="sub exc-lbl" x="240" y="145" text-anchor="middle" style="font-size:9px;font-weight:600;">Ca²⁺</text>
<line x1="225" y1="162" x2="225" y2="174" class="arrow-proc" stroke-width="1" marker-end="url(#arr-g)"/>
<line x1="240" y1="156" x2="240" y2="174" class="arrow-proc" stroke-width="1" marker-end="url(#arr-g)"/>
<line x1="255" y1="162" x2="255" y2="174" class="arrow-proc" stroke-width="1" marker-end="url(#arr-g)"/>

<!-- cpGFP barrel — bright, glowing -->
<ellipse cx="240" cy="205" rx="22" ry="28" class="eff-fill" stroke-width="2" filter="url(#glow)"/>
<text class="sub eff-lbl" x="240" y="200" text-anchor="middle" style="font-size:9px;font-weight:600;">cpGFP</text>
<text class="sub eff-lbl" x="240" y="213" text-anchor="middle" style="font-size:9px;">ON</text>

<!-- CaM + M13 compact (wrapped together) -->
<ellipse cx="240" cy="260" rx="22" ry="13" class="comp-box" stroke-width="1.2"/>
<text class="sub sub-lbl" x="240" y="264" text-anchor="middle" style="font-size:8.5px;">CaM · M13</text>
<text class="sub sub-lbl" x="240" y="279" text-anchor="middle" style="font-size:8.5px;">(compact)</text>

<!-- Fluorescence emission arrow -->
<path d="M240,177 L240,164" fill="none" class="eff-lbl" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"
  marker-end="url(#arr-g)"/>
<text class="sub eff-lbl" x="248" y="162" style="font-size:8.5px;">hν</text>

<text class="sub eff-lbl" x="240" y="302" text-anchor="middle" style="font-size:9px;font-weight:600;">high fluorescence</text>
<text class="sub sub-lbl" x="240" y="315" text-anchor="middle" style="font-size:8.5px;">ΔF/F ↑</text>

<!-- Transition arrow between states -->
<path d="M128,218 Q169,204 214,218" fill="none" class="arrow-proc" stroke-width="1.6"
  marker-end="url(#arr-g)"/>
<text class="sub sub-lbl" x="169" y="198" text-anchor="middle" style="font-size:8.5px;">+ 4 Ca²⁺</text>

<!-- Summary box -->
<rect x="22" y="338" width="294" height="46" rx="4" class="sum-box" stroke-width="0.5"/>
<text class="sub panel-hd" x="169" y="354" text-anchor="middle" style="font-size:10px;font-weight:600;">Reports: intracellular [Ca²⁺]</text>
<text class="sub sub-lbl" x="169" y="367" text-anchor="middle" style="font-size:9px;">proxy for action potential firing</text>
<text class="sub sub-lbl" x="169" y="378" text-anchor="middle" style="font-size:9px;">location: cytoplasm</text>

<!-- ══════════════════════════════
  RIGHT PANEL: GRAB  x=352..670
══════════════════════════════ -->
<rect x="352" y="26" width="318" height="420" rx="6" class="frame" stroke-width="0.5"/>
<text class="hd sted-lbl" x="511" y="47" text-anchor="middle">GRAB Sensor</text>
<text class="sub sub-lbl" x="511" y="60" text-anchor="middle">extracellular neuromodulator sensor</text>

<!-- Space labels -->
<text class="sub sub-lbl" x="362" y="88"  style="font-size:9px;">extracellular</text>
<text class="sub sub-lbl" x="362" y="230" style="font-size:9px;">cytoplasm</text>

<!-- ── GPCR STRUCTURE (centered, x=420..600) ──
  7 TM helices spanning the membrane band y=94..110,
  with extracellular loops above and intracellular loops below.
  Helix spacing: 8px wide, 14px apart, 7 helices → total 7*8+6*14=56+84=140px
  Start x=431, each TM at x=431+i*22 for i=0..6
  TM1:x=431, TM2:453, TM3:475, TM4:497, TM5:519, TM6:541, TM7:563 (each 8px wide)
  TM rects: y=84..120 (36px tall, spanning through membrane) -->

<!-- TM helices (7 rectangles through membrane) -->
<rect x="431" y="84" width="9" height="36" rx="3" class="tm-fill" stroke-width="0.8"/>
<rect x="453" y="82" width="9" height="40" rx="3" class="tm-fill" stroke-width="0.8"/>
<rect x="475" y="84" width="9" height="36" rx="3" class="tm-fill" stroke-width="0.8"/>
<rect x="497" y="82" width="9" height="40" rx="3" class="tm-fill" stroke-width="0.8"/>
<rect x="519" y="84" width="9" height="36" rx="3" class="tm-fill" stroke-width="0.8"/>
<rect x="541" y="82" width="9" height="40" rx="3" class="tm-fill" stroke-width="0.8"/>
<rect x="563" y="84" width="9" height="36" rx="3" class="tm-fill" stroke-width="0.8"/>

<!-- Membrane band (same y as left panel) -->
<rect x="352" y="94" width="318" height="16" rx="0" class="memb-fill" stroke-width="0.8" opacity="0.6"/>

<!-- Extracellular loops connecting TM tops -->
<!-- Loop 1-2 (ECL1): from top of TM1(435,84) to top of TM2(457,82) -->
<path d="M440,84 Q449,72 458,82" fill="none" class="comp-box" stroke-width="1.2"/>
<!-- Loop 2-3 (ECL2): TM3-TM4 (binding pocket loop) -->
<path d="M480,84 Q492,68 502,82" fill="none" class="comp-box" stroke-width="1.5"/>
<!-- Loop 3-4: TM5-TM6 -->
<path d="M524,84 Q534,72 546,82" fill="none" class="comp-box" stroke-width="1.2"/>
<!-- Loop 4: TM6-TM7 -->
<path d="M546,82 Q556,74 568,84" fill="none" class="comp-box" stroke-width="1"/>

<!-- Intracellular loops: TM2-TM3, TM4-TM5, TM6-TM7 -->
<path d="M458,122 Q466,132 480,122" fill="none" class="comp-box" stroke-width="1"/>
<path d="M502,122 Q510,132 524,122" fill="none" class="comp-box" stroke-width="1"/>

<!-- cpGFP in intracellular loop 3 (between TM5 and TM6, x≈519..541, y=120) -->
<!-- Connection line from ICL3 down to cpGFP -->
<line x1="530" y1="124" x2="530" y2="158" class="arrow-proc" stroke-width="1.2"/>
<!-- cpGFP barrel (bright, active) -->
<ellipse cx="530" cy="186" rx="22" ry="28" class="eff-fill" stroke-width="2" filter="url(#glow)"/>
<text class="sub eff-lbl" x="530" y="182" text-anchor="middle" style="font-size:9px;font-weight:600;">cpGFP</text>
<text class="sub eff-lbl" x="530" y="194" text-anchor="middle" style="font-size:9px;">ON</text>

<!-- Fluorescence emission arrow from cpGFP upward -->
<path d="M530,158 L530,148" fill="none" class="eff-lbl" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr-g)"/>
<text class="sub eff-lbl" x="538" y="146" style="font-size:8.5px;">hν</text>

<!-- DOPAMINE molecule above membrane near ECL2 binding pocket -->
<circle cx="492" cy="65" r="10" class="sted-fill" stroke-width="1.5"/>
<text class="sub sted-lbl" x="492" y="69" text-anchor="middle" style="font-size:9px;font-weight:700;">DA</text>
<!-- Arrow: DA binding into receptor -->
<line x1="492" y1="75" x2="492" y2="84" class="sted-lbl" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr-g)"/>

<!-- Label: ligand binds orthosteric site -->
<text class="sub sted-lbl" x="492" y="58" text-anchor="middle" style="font-size:8.5px;">binds orthosteric site</text>
<line x1="492" y1="50" x2="492" y2="54" class="divider" stroke-width="0.7" stroke-dasharray="2 2"/>

<!-- GPCR conformational change arrow (extracellular loop ECL2 flexes) -->
<text class="sub sub-lbl" x="492" y="80" text-anchor="middle" style="font-size:7.5px;">ECL2</text>

<!-- cpGFP state label -->
<text class="sub sub-lbl" x="530" y="228" text-anchor="middle" style="font-size:9px;">intracellular loop 3</text>
<text class="sub eff-lbl" x="530" y="244" text-anchor="middle" style="font-size:9px;font-weight:600;">high fluorescence</text>
<text class="sub sub-lbl" x="530" y="257" text-anchor="middle" style="font-size:8.5px;">ΔF/F ↑</text>

<!-- Key difference: location of sensing -->
<line x1="362" y1="278" x2="660" y2="278" class="divider" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="sub sub-lbl" x="511" y="295" text-anchor="middle" style="font-size:9px;">Ligand is detected</text>
<text class="sub sted-lbl" x="511" y="309" text-anchor="middle" style="font-size:10px;font-weight:600;">in the extracellular space</text>
<text class="sub sub-lbl" x="511" y="322" text-anchor="middle" style="font-size:9px;">regardless of release origin</text>

<!-- Summary box -->
<rect x="364" y="338" width="294" height="46" rx="4" class="sum-box" stroke-width="0.5"/>
<text class="sub panel-hd" x="511" y="354" text-anchor="middle" style="font-size:10px;font-weight:600;">Reports: extracellular [NT]</text>
<text class="sub sub-lbl" x="511" y="367" text-anchor="middle" style="font-size:9px;">direct neurotransmitter measurement</text>
<text class="sub sub-lbl" x="511" y="378" text-anchor="middle" style="font-size:9px;">location: plasma membrane (surface)</text>

<!-- VS divider and label -->
<line x1="340" y1="26" x2="340" y2="446" class="divider" stroke-width="1" stroke-dasharray="1 0"/>
<rect x="324" y="216" width="32" height="22" rx="4" class="sum-box" stroke-width="0.5"/>
<text class="sub sub-lbl" x="340" y="231" text-anchor="middle" style="font-size:11px;font-weight:600;">vs</text>

<!-- Bottom key distinction -->
<rect x="10" y="452" width="660" height="22" rx="4" class="sum-box" stroke-width="0.5"/>
<text class="sub sub-lbl" x="160" y="467" text-anchor="middle" style="font-size:9.5px;">
  <tspan class="exc-lbl">GCaMP</tspan>
</text>
<text class="sub sum-txt" x="340" y="467" text-anchor="middle" style="font-size:9px;">infers spiking via cytosolic Ca²⁺ · · ·</text>
<text class="sub sub-lbl" x="520" y="467" text-anchor="middle" style="font-size:9.5px;">
  <tspan class="sted-lbl">GRAB</tspan>
</text>

<!-- Rewrite bottom as two text elements to avoid tspan color issues -->
</svg>
