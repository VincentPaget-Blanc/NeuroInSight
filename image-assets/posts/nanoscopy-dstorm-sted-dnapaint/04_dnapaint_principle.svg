<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .ttl  { fill: #e8e6de; }
      .frm  { fill: none; stroke: rgba(222,220,209,0.22); }
      .cap  { fill: #9c9a92; }
      .dim  { fill: #5f5e5a; }
      .div  { stroke: rgba(222,220,209,0.18); }
      .box  { fill: none; stroke: rgba(222,220,209,0.20); }
      /* surface / membrane */
      .surf { fill: rgba(222,220,209,0.08); stroke: rgba(222,220,209,0.25); }
      /* target blob */
      .tgt  { fill: #2e2e2c; stroke: rgba(222,220,209,0.30); }
      .tgt-t{ fill: #9c9a92; }
      /* antibody complex — purple */
      .ab   { fill: #534AB7; }
      /* docking strand — purple line */
      .ds   { stroke: #AFA9EC; fill: none; }
      .ds-t { fill: #AFA9EC; }
      /* imager free — dim teal */
      .imf  { stroke: rgba(93,202,165,0.40); fill: rgba(93,202,165,0.18); }
      /* imager bound + dye + halo */
      .imb  { stroke: #1D9E75; }
      .dye  { fill: #1D9E75; }
      .halo { fill: rgba(29,158,117,0.16); }
      .on-t { fill: #1D9E75; }
      /* arrows */
      .arr  { stroke: #5f5e5a; }
      /* OFF indicator */
      .off-t{ fill: #5f5e5a; }
      /* Exchange rounds */
      .r1b  { fill: rgba(83,74,183,0.18);  stroke: #7F77DD; }
      .r2b  { fill: rgba(29,158,117,0.18); stroke: #1D9E75; }
      .r3b  { fill: rgba(224,160,60,0.18); stroke: #E0A03C; }
      .r1t  { fill: #AFA9EC; }
      .r2t  { fill: #5DCAA5; }
      .r3t  { fill: #E0A03C; }
      .wsh  { fill: #E24B4A; }
      .snum { fill: rgba(222,220,209,0.12); stroke: rgba(222,220,209,0.25); }
      .snumt{ fill: #e8e6de; }
    }
    @media (prefers-color-scheme: light) {
      .ttl  { fill: #1a1a1a; }
      .frm  { fill: none; stroke: #D3D1C7; }
      .cap  { fill: #5f5e5a; }
      .dim  { fill: #B4B2A9; }
      .div  { stroke: #D3D1C7; }
      .box  { fill: none; stroke: #D3D1C7; }
      .surf { fill: rgba(0,0,0,0.03); stroke: #D3D1C7; }
      .tgt  { fill: #e8e6de; stroke: #C8C6BC; }
      .tgt-t{ fill: #888780; }
      .ab   { fill: #534AB7; }
      .ds   { stroke: #534AB7; fill: none; }
      .ds-t { fill: #534AB7; }
      .imf  { stroke: rgba(15,110,86,0.28); fill: rgba(15,110,86,0.08); }
      .imb  { stroke: #0F6E56; }
      .dye  { fill: #0F6E56; }
      .halo { fill: rgba(15,110,86,0.10); }
      .on-t { fill: #0F6E56; }
      .arr  { stroke: #B4B2A9; }
      .off-t{ fill: #B4B2A9; }
      .r1b  { fill: rgba(83,74,183,0.07);  stroke: #534AB7; }
      .r2b  { fill: rgba(15,110,86,0.07);  stroke: #0F6E56; }
      .r3b  { fill: rgba(180,110,10,0.07); stroke: #B46E0A; }
      .r1t  { fill: #534AB7; }
      .r2t  { fill: #0F6E56; }
      .r3t  { fill: #B46E0A; }
      .wsh  { fill: #C83232; }
      .snum { fill: rgba(0,0,0,0.05); stroke: #D3D1C7; }
      .snumt{ fill: #1a1a1a; }
    }
    .hd { font: 600 13px "Helvetica Neue",Arial,sans-serif; }
    .lb { font: 500 12px "Helvetica Neue",Arial,sans-serif; }
    .sb { font: 400 11px "Helvetica Neue",Arial,sans-serif; }
    .mn { font: 400 11px "JetBrains Mono","Courier New",monospace; }
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ═══ TITLE ═══ -->
<text class="hd ttl" x="340" y="20" text-anchor="middle">DNA-PAINT — Programmable Transient Binding</text>

<!-- ══════════════════════════════════════════
     THREE STATE PANELS  y=30–255
     Each panel 200 wide, separated by 10
     Left edges: 20, 240, 460
     ════════════════════════════════════════ -->

<!-- Step badges (centred in each panel: 120, 340, 560) -->
<circle cx="120" cy="44" r="11" class="snum" stroke-width="0.8"/>
<text class="lb snumt" x="120" y="49" text-anchor="middle">1</text>
<circle cx="340" cy="44" r="11" class="snum" stroke-width="0.8"/>
<text class="lb snumt" x="340" y="49" text-anchor="middle">2</text>
<circle cx="560" cy="44" r="11" class="snum" stroke-width="0.8"/>
<text class="lb snumt" x="560" y="49" text-anchor="middle">3</text>

<!-- ────────────────────────────────────────
     PANEL 1  x=20–220  y=30–255
     "Label target — dark"
     ──────────────────────────────────────── -->
<rect x="20" y="30" width="200" height="225" rx="5" class="frm" stroke-width="0.5"/>
<text class="lb cap" x="120" y="58" text-anchor="middle">Label target · no imager</text>

<!-- Surface bar -->
<rect x="30" y="65" width="180" height="11" rx="3" class="surf" stroke-width="0.8"/>
<text class="sb dim" x="120" y="74" text-anchor="middle">surface / coverslip</text>

<!-- Target protein — simple rounded rectangle -->
<rect x="85" y="76" width="70" height="26" rx="7" class="tgt" stroke-width="0.8"/>
<text class="sb tgt-t" x="120" y="93" text-anchor="middle">target protein</text>

<!-- Antibody complex — drawn as a simple Y icon + colour block
     to avoid the unreadable tiny Y shape.
     Use a pentagon/trapezoid to suggest antibody body. -->
<!-- Ab body (rectangle body) -->
<rect x="104" y="102" width="32" height="20" rx="3" class="ab"/>
<!-- Ab arms (two upward lines) -->
<line x1="108" y1="102" x2="100" y2="88"  class="ab" stroke-width="4" stroke-linecap="round"/>
<line x1="136" y1="102" x2="140" y2="88"  class="ab" stroke-width="4" stroke-linecap="round"/>
<!-- Fab tips -->
<circle cx="100" cy="87" r="4" class="ab"/>
<circle cx="140" cy="87" r="4" class="ab"/>
<!-- Label: 1° + 2° Ab combined into one labelled block for clarity -->
<text class="sb ds-t" x="152" y="100" text-anchor="start">Ab complex</text>
<text class="sb dim"  x="152" y="112" text-anchor="start">(1° + 2°)</text>

<!-- Docking strand — wavy line downward from antibody body base -->
<!-- represented as a thicker dashed line with a distinctive colour -->
<line x1="120" y1="122" x2="120" y2="158" class="ds" stroke-width="2.5" stroke-linecap="round"/>
<!-- Tick marks suggesting nucleotides -->
<line x1="113" y1="130" x2="127" y2="130" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="113" y1="138" x2="127" y2="138" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="113" y1="146" x2="127" y2="146" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="113" y1="154" x2="127" y2="154" class="ds" stroke-width="1" opacity="0.55"/>
<text class="sb ds-t" x="133" y="133" text-anchor="start">docking strand</text>
<text class="sb dim"  x="133" y="145" text-anchor="start">ssDNA (unique seq.)</text>
<text class="sb dim"  x="133" y="157" text-anchor="start">conjugated to 2° Ab</text>

<!-- Docking strand tip (free, available) -->
<circle cx="120" cy="162" r="5" class="ds" stroke-width="1.5"/>

<!-- OFF state label -->
<rect x="80" y="178" width="80" height="20" rx="4" class="frm" stroke-width="0.8"/>
<text class="sb off-t" x="120" y="192" text-anchor="middle">● fluorescence OFF</text>
<text class="sb cap"   x="120" y="215" text-anchor="middle">No imager bound.</text>
<text class="sb cap"   x="120" y="227" text-anchor="middle">Target is dark.</text>
<text class="sb cap"   x="120" y="240" text-anchor="middle">Docking strand waits.</text>

<!-- ────────────────────────────────────────
     PANEL 2  x=240–440  y=30–255
     "Imager binds — ON event"
     ──────────────────────────────────────── -->
<rect x="240" y="30" width="200" height="225" rx="5" class="frm" stroke-width="0.5"/>
<text class="lb cap" x="340" y="58" text-anchor="middle">Imager binds → ON event</text>

<!-- Surface -->
<rect x="250" y="65" width="180" height="11" rx="3" class="surf" stroke-width="0.8"/>
<!-- Target -->
<rect x="305" y="76" width="70" height="26" rx="7" class="tgt" stroke-width="0.8"/>
<text class="sb tgt-t" x="340" y="93" text-anchor="middle">target protein</text>
<!-- Ab -->
<rect x="324" y="102" width="32" height="20" rx="3" class="ab"/>
<line x1="328" y1="102" x2="320" y2="88" class="ab" stroke-width="4" stroke-linecap="round"/>
<line x1="356" y1="102" x2="360" y2="88" class="ab" stroke-width="4" stroke-linecap="round"/>
<circle cx="320" cy="87" r="4" class="ab"/>
<circle cx="360" cy="87" r="4" class="ab"/>
<!-- Docking strand -->
<line x1="340" y1="122" x2="340" y2="148" class="ds" stroke-width="2.5" stroke-linecap="round"/>
<line x1="333" y1="130" x2="347" y2="130" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="333" y1="138" x2="347" y2="138" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="333" y1="146" x2="347" y2="146" class="ds" stroke-width="1" opacity="0.55"/>

<!-- Imager strand hybridised — teal, complementary to docking -->
<line x1="340" y1="148" x2="340" y2="168" class="imb" stroke-width="3" stroke-linecap="round"/>
<!-- Dye at tip -->
<circle cx="340" cy="178" r="24" class="halo"/>
<circle cx="340" cy="178" r="8"  class="dye"/>

<!-- Free imagers drifting in solution (inside panel bounds only) -->
<line x1="258" y1="140" x2="272" y2="140" class="imf" stroke-width="1.5" stroke-dasharray="3 1" stroke-linecap="round"/>
<circle cx="276" cy="140" r="4" class="imf" stroke-width="0.8"/>
<line x1="390" y1="150" x2="404" y2="150" class="imf" stroke-width="1.5" stroke-dasharray="3 1" stroke-linecap="round"/>
<circle cx="408" cy="150" r="4" class="imf" stroke-width="0.8"/>

<!-- Imager label callout (all within x=240–440) -->
<line x1="349" y1="168" x2="380" y2="155" class="arr" stroke-width="0.8" marker-end="url(#a)"/>
<text class="sb on-t"  x="340" y="210" text-anchor="middle">● fluorescence ON</text>
<text class="mn on-t"  x="340" y="223" text-anchor="middle">dwell: 0.5–3 s</text>
<text class="sb cap"   x="340" y="237" text-anchor="middle">→ Gaussian fit → localise</text>
<text class="sb dim"   x="340" y="249" text-anchor="middle">imager: ssDNA + dye (8–10 nt)</text>

<!-- ────────────────────────────────────────
     PANEL 3  x=460–660  y=30–255
     "Imager dissociates — reset"
     ──────────────────────────────────────── -->
<rect x="460" y="30" width="200" height="225" rx="5" class="frm" stroke-width="0.5"/>
<text class="lb cap" x="560" y="58" text-anchor="middle">Imager dissociates → reset</text>

<!-- Surface -->
<rect x="470" y="65" width="180" height="11" rx="3" class="surf" stroke-width="0.8"/>
<!-- Target -->
<rect x="525" y="76" width="70" height="26" rx="7" class="tgt" stroke-width="0.8"/>
<text class="sb tgt-t" x="560" y="93" text-anchor="middle">target protein</text>
<!-- Ab -->
<rect x="544" y="102" width="32" height="20" rx="3" class="ab"/>
<line x1="548" y1="102" x2="540" y2="88" class="ab" stroke-width="4" stroke-linecap="round"/>
<line x1="576" y1="102" x2="580" y2="88" class="ab" stroke-width="4" stroke-linecap="round"/>
<circle cx="540" cy="87" r="4" class="ab"/>
<circle cx="580" cy="87" r="4" class="ab"/>
<!-- Docking strand -->
<line x1="560" y1="122" x2="560" y2="158" class="ds" stroke-width="2.5" stroke-linecap="round"/>
<line x1="553" y1="130" x2="567" y2="130" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="553" y1="138" x2="567" y2="138" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="553" y1="146" x2="567" y2="146" class="ds" stroke-width="1" opacity="0.55"/>
<line x1="553" y1="154" x2="567" y2="154" class="ds" stroke-width="1" opacity="0.55"/>
<!-- Docking strand tip available -->
<circle cx="560" cy="163" r="5" class="ds" stroke-width="1.5"/>

<!-- Imager leaving (dashed, upward arrow, stays inside panel) -->
<line x1="560" y1="163" x2="560" y2="143" class="imf" stroke-width="2" stroke-dasharray="3 2" stroke-linecap="round" marker-end="url(#a)"/>

<!-- OFF state + key point -->
<rect x="500" y="175" width="120" height="20" rx="4" class="frm" stroke-width="0.8"/>
<text class="sb off-t" x="560" y="189" text-anchor="middle">● fluorescence OFF</text>
<text class="sb on-t"  x="560" y="213" text-anchor="middle">Docking strand intact!</text>
<text class="sb cap"   x="560" y="225" text-anchor="middle">Next imager can bind.</text>
<text class="sb cap"   x="560" y="237" text-anchor="middle">No bleaching ceiling.</text>
<text class="sb cap"   x="560" y="249" text-anchor="middle">Cycle repeats indefinitely.</text>

<!-- Inter-panel arrows (between panels, in the 20px gaps) -->
<line x1="224" y1="145" x2="236" y2="145" class="arr" stroke-width="1.3" marker-end="url(#a)"/>
<line x1="444" y1="145" x2="456" y2="145" class="arr" stroke-width="1.3" marker-end="url(#a)"/>

<!-- ══════════════════════════════════════════
     INTENSITY TRACE  y=265–315
     ════════════════════════════════════════ -->
<rect x="20" y="263" width="640" height="52" rx="5" class="box" stroke-width="0.5"/>
<text class="lb cap" x="340" y="280" text-anchor="middle">Fluorescence intensity at one docking site over time</text>

<!-- Axes -->
<line x1="40" y1="306" x2="646" y2="306" class="arr" stroke-width="0.8" marker-end="url(#a)"/>
<text class="sb dim" x="650" y="310" text-anchor="start">t</text>
<!-- Baseline -->
<line x1="40" y1="299" x2="646" y2="299" class="div" stroke-width="0.4" stroke-dasharray="2 2"/>

<!-- ON pulses (teal rectangles rising from baseline) -->
<rect x="72"  y="288" width="22" height="12" rx="1" class="dye" opacity="0.85"/>
<rect x="150" y="288" width="30" height="12" rx="1" class="dye" opacity="0.85"/>
<rect x="255" y="288" width="18" height="12" rx="1" class="dye" opacity="0.85"/>
<rect x="348" y="288" width="26" height="12" rx="1" class="dye" opacity="0.85"/>
<rect x="448" y="288" width="20" height="12" rx="1" class="dye" opacity="0.85"/>
<rect x="556" y="288" width="28" height="12" rx="1" class="dye" opacity="0.85"/>

<!-- Single label for one pulse (kept short, centred) -->
<line x1="83"  y1="287" x2="83"  y2="282" class="arr" stroke-width="0.7" marker-end="url(#a)"/>
<text class="sb on-t" x="83" y="279" text-anchor="middle">1 event = 1 localisation</text>

<!-- ══════════════════════════════════════════
     EXCHANGE-PAINT  y=325–475
     Three round boxes + key points
     ════════════════════════════════════════ -->
<rect x="20" y="323" width="640" height="225" rx="6" class="box" stroke-width="0.5"/>
<text class="hd ttl" x="340" y="343" text-anchor="middle">Exchange-PAINT — Multiplexing with a Single Dye</text>
<line x1="40" y1="350" x2="640" y2="350" class="div" stroke-width="0.5"/>

<!-- Round boxes: each 180 wide, spaced evenly within 640 -->
<!-- centres: 120, 340, 560 -->
<rect x="30"  y="358" width="180" height="60" rx="5" class="r1b" stroke-width="0.8"/>
<text class="lb r1t" x="120" y="375" text-anchor="middle">Round 1</text>
<text class="sb r1t" x="120" y="390" text-anchor="middle">imager-P1 in buffer</text>
<text class="sb cap" x="120" y="405" text-anchor="middle">→ image target A</text>

<rect x="250" y="358" width="180" height="60" rx="5" class="r2b" stroke-width="0.8"/>
<text class="lb r2t" x="340" y="375" text-anchor="middle">Round 2</text>
<text class="sb r2t" x="340" y="390" text-anchor="middle">imager-P2 in buffer</text>
<text class="sb cap" x="340" y="405" text-anchor="middle">→ image target B</text>

<rect x="470" y="358" width="180" height="60" rx="5" class="r3b" stroke-width="0.8"/>
<text class="lb r3t" x="560" y="375" text-anchor="middle">Round 3 … N</text>
<text class="sb r3t" x="560" y="390" text-anchor="middle">imager-P3… in buffer</text>
<text class="sb cap" x="560" y="405" text-anchor="middle">→ image target C…</text>

<!-- Wash arrows between boxes -->
<line x1="214" y1="388" x2="246" y2="388" class="arr" stroke-width="1.2" marker-end="url(#a)"/>
<text class="sb wsh" x="230" y="382" text-anchor="middle">wash</text>
<line x1="434" y1="388" x2="466" y2="388" class="arr" stroke-width="1.2" marker-end="url(#a)"/>
<text class="sb wsh" x="450" y="382" text-anchor="middle">wash</text>

<!-- Divider before key points -->
<line x1="40" y1="428" x2="640" y2="428" class="div" stroke-width="0.4"/>

<!-- Key points — short lines, well within 660 right edge -->
<text class="sb cap"  x="50" y="446" text-anchor="start">✓  Same dye and laser every round — no spectral crosstalk between targets</text>
<text class="sb cap"  x="50" y="463" text-anchor="start">✓  Each target has a unique docking sequence — orthogonal, no cross-hybridisation</text>
<text class="sb cap"  x="50" y="480" text-anchor="start">✓  Washing removes only imager strands — docking strands remain intact on sample</text>
<text class="sb on-t" x="50" y="497" text-anchor="start">→  In principle unlimited targets, constrained only by available orthogonal sequences</text>
<text class="sb on-t" x="50" y="513" text-anchor="start">→  Binding frequency can be quantified → absolute molecule counts (qPAINT)</text>
<text class="sb cap"  x="50" y="530" text-anchor="start">    Typical resolution: 10–20 nm in cells; sub-10 nm on DNA origami in vitro</text>

</svg>
