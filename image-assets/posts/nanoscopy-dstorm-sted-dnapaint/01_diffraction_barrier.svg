<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .panel-hd  { fill: #e8e6de; }
      .frame     { fill: none; stroke: rgba(222,220,209,0.25); }
      .sub-lbl   { fill: #9c9a92; }
      .axis-lbl  { fill: #5f5e5a; }
      .divider   { stroke: rgba(222,220,209,0.18); }
      .sum-box   { fill: none; stroke: rgba(222,220,209,0.2); }
      .sum-hd    { fill: #e8e6de; }
      .sum-txt   { fill: #9c9a92; }
      /* confocal — warm amber */
      .psf-conf-a  { fill: rgba(224,160,60,0.18); stroke: #E0A03C; }
      .psf-conf-b  { fill: rgba(224,160,60,0.10); stroke: #E0A03C; }
      .peak-conf { fill: #E0A03C; }
      .lbl-conf  { fill: #E0A03C; }
      /* super-res — teal */
      .psf-sr-a  { fill: rgba(29,158,117,0.25); stroke: #1D9E75; }
      .psf-sr-b  { fill: rgba(29,158,117,0.15); stroke: #1D9E75; }
      .peak-sr   { fill: #1D9E75; }
      .lbl-sr    { fill: #1D9E75; }
      /* scale bars */
      .scale-bar { stroke: #e8e6de; }
      .scale-txt { fill: #9c9a92; }
      .arr-dim   { stroke: #5f5e5a; }
      .dim-txt   { fill: #5f5e5a; }
    }
    @media (prefers-color-scheme: light) {
      .panel-hd  { fill: #1a1a1a; }
      .frame     { fill: none; stroke: #D3D1C7; }
      .sub-lbl   { fill: #5f5e5a; }
      .axis-lbl  { fill: #B4B2A9; }
      .divider   { stroke: #D3D1C7; }
      .sum-box   { fill: none; stroke: #D3D1C7; }
      .sum-hd    { fill: #1a1a1a; }
      .sum-txt   { fill: #5f5e5a; }
      .psf-conf-a  { fill: rgba(180,110,10,0.12); stroke: #B46E0A; }
      .psf-conf-b  { fill: rgba(180,110,10,0.06); stroke: #B46E0A; }
      .peak-conf { fill: #B46E0A; }
      .lbl-conf  { fill: #B46E0A; }
      .psf-sr-a  { fill: rgba(15,110,86,0.15); stroke: #0F6E56; }
      .psf-sr-b  { fill: rgba(15,110,86,0.08); stroke: #0F6E56; }
      .peak-sr   { fill: #0F6E56; }
      .lbl-sr    { fill: #0F6E56; }
      .scale-bar { stroke: #1a1a1a; }
      .scale-txt { fill: #5f5e5a; }
      .arr-dim   { stroke: #B4B2A9; }
      .dim-txt   { fill: #B4B2A9; }
    }
    .hd  { font: 600 13px "Helvetica Neue", Arial, sans-serif; }
    .lbl { font: 500 12px "Helvetica Neue", Arial, sans-serif; }
    .sub { font: 400 11px "Helvetica Neue", Arial, sans-serif; }
    .mono{ font: 400 11px "JetBrains Mono", "Courier New", monospace; }
  </style>
  <marker id="arr-d" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ═══ TITLE ═══ -->
<text class="hd panel-hd" x="340" y="22" text-anchor="middle">The Diffraction Barrier</text>

<!-- ══════════════════════════════════
     LEFT PANEL: Confocal — two points unresolved
     x: 20–320   y: 38–230
     ════════════════════════════════ -->
<rect x="20" y="32" width="300" height="198" rx="5" class="frame" stroke-width="0.5"/>
<text class="lbl sub-lbl" x="170" y="50" text-anchor="middle">Confocal — ~200 nm resolution</text>

<!-- Two overlapping PSF curves rendered as ellipses (cross-section view) -->
<!-- PSF A centred at x=120, PSF B at x=220 — they overlap because ~200nm -->
<!-- Outer haloes -->
<ellipse cx="128" cy="145" rx="80" ry="60" class="psf-conf-b" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.6"/>
<ellipse cx="222" cy="145" rx="80" ry="60" class="psf-conf-b" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.6"/>
<!-- Inner cores -->
<ellipse cx="128" cy="145" rx="44" ry="33" class="psf-conf-a" stroke-width="1"/>
<ellipse cx="222" cy="145" rx="44" ry="33" class="psf-conf-a" stroke-width="1"/>
<!-- Peaks -->
<circle cx="128" cy="145" r="4" class="peak-conf"/>
<circle cx="222" cy="145" r="4" class="peak-conf"/>

<!-- Separation arrow -->
<line x1="132" y1="175" x2="218" y2="175" class="arr-dim" stroke-width="1"
  marker-start="url(#arr-d)" marker-end="url(#arr-d)"/>
<text class="mono dim-txt" x="175" y="172" text-anchor="middle">~200 nm</text>

<!-- Unresolved label -->
<text class="sub lbl-conf" x="175" y="215" text-anchor="middle">⚠ two emitters → single blurred spot</text>

<!-- ══════════════════════════════════
     RIGHT PANEL: Super-res — two points resolved
     x: 360–660   y: 38–230
     ════════════════════════════════ -->
<rect x="360" y="32" width="300" height="198" rx="5" class="frame" stroke-width="0.5"/>
<text class="lbl sub-lbl" x="510" y="50" text-anchor="middle">Super-resolution — ~20 nm precision</text>

<!-- Two tight PSFs, clearly separated -->
<!-- PSF A at x=448, PSF B at x=572 -->
<ellipse cx="448" cy="145" rx="20" ry="15" class="psf-sr-b" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.6"/>
<ellipse cx="572" cy="145" rx="20" ry="15" class="psf-sr-b" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.6"/>
<ellipse cx="448" cy="145" rx="10" ry="8" class="psf-sr-a" stroke-width="1"/>
<ellipse cx="572" cy="145" rx="10" ry="8" class="psf-sr-a" stroke-width="1"/>
<circle cx="448" cy="145" r="3.5" class="peak-sr"/>
<circle cx="572" cy="145" r="3.5" class="peak-sr"/>

<!-- Separation arrow -->
<line x1="452" y1="175" x2="568" y2="175" class="arr-dim" stroke-width="1"
  marker-start="url(#arr-d)" marker-end="url(#arr-d)"/>
<text class="mono dim-txt" x="510" y="172" text-anchor="middle">~120 nm</text>

<!-- Resolved label -->
<text class="sub lbl-sr" x="510" y="215" text-anchor="middle">✓ two distinct molecular positions</text>

<!-- ══════════════════════════════════
     DIVIDER
     ════════════════════════════════ -->
<line x1="340" y1="32" x2="340" y2="230" class="divider" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- ══════════════════════════════════
     BOTTOM: Summary table
     y: 248–390
     ════════════════════════════════ -->
<rect x="20" y="248" width="640" height="130" rx="6" class="sum-box" stroke-width="0.5"/>
<text class="hd sum-hd" x="340" y="268" text-anchor="middle">Abbe Diffraction Limit</text>

<!-- Formula -->
<text class="mono sum-txt" x="340" y="292" text-anchor="middle">d = λ / (2 · n · sinα)    →    ~200–250 nm lateral, ~500 nm axial (visible light)</text>

<line x1="40" y1="302" x2="640" y2="302" class="divider" stroke-width="0.5"/>

<!-- Three columns: key concept -->
<text class="sub sum-txt" x="160" y="320" text-anchor="middle">Applies to ensembles of</text>
<text class="sub sum-txt" x="160" y="335" text-anchor="middle">simultaneously emitting fluorophores</text>

<line x1="340" y1="305" x2="340" y2="368" class="divider" stroke-width="0.5" stroke-dasharray="3 2"/>

<text class="sub sum-txt" x="510" y="320" text-anchor="middle">Control which molecules emit</text>
<text class="sub sum-txt" x="510" y="335" text-anchor="middle">at any moment → break the limit</text>

<!-- Two strategy labels -->
<text class="lbl lbl-conf" x="160" y="358" text-anchor="middle">Spatially engineer emission volume</text>
<text class="lbl lbl-sr"   x="510" y="358" text-anchor="middle">Separate emitters stochastically in time</text>

<text class="sub axis-lbl" x="160" y="373" text-anchor="middle">→ STED</text>
<text class="sub axis-lbl" x="510" y="373" text-anchor="middle">→ dSTORM · DNA-PAINT</text>

</svg>
