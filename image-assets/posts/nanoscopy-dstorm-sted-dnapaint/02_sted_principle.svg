<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .panel-hd  { fill: #e8e6de; }
      .frame     { fill: none; stroke: rgba(222,220,209,0.25); }
      .sub-lbl   { fill: #9c9a92; }
      .divider   { stroke: rgba(222,220,209,0.18); }
      .sum-box   { fill: none; stroke: rgba(222,220,209,0.2); }
      .sum-hd    { fill: #e8e6de; }
      .sum-txt   { fill: #9c9a92; }
      .arr-neu   { stroke: #5f5e5a; }
      /* excitation — cyan-blue */
      .exc-fill  { fill: rgba(100,160,240,0.22); stroke: #64A0F0; }
      .exc-lbl   { fill: #64A0F0; }
      /* STED beam — red-orange doughnut */
      .sted-fill { fill: rgba(226,75,74,0.22); stroke: #E24B4A; }
      .sted-zero { fill: rgba(0,0,0,0); }
      .sted-lbl  { fill: #E24B4A; }
      /* effective PSF — teal */
      .eff-fill  { fill: rgba(29,158,117,0.30); stroke: #1D9E75; }
      .eff-lbl   { fill: #1D9E75; }
      /* fluorophore states */
      .fl-on     { fill: #64A0F0; }
      .fl-off    { fill: #5f5e5a; }
      .fl-dep    { fill: #E24B4A; }
      .arrow-proc { stroke: #9c9a92; }
      .energy-bg { fill: rgba(222,220,209,0.05); stroke: rgba(222,220,209,0.15); }
      .level-s0  { stroke: #5DCAA5; }
      .level-s1  { stroke: #64A0F0; }
      .level-vib { stroke: rgba(222,220,209,0.35); }
      .state-lbl { fill: #9c9a92; }
      .trnx-exc  { stroke: #64A0F0; }
      .trnx-sted { stroke: #E24B4A; }
      .trnx-flu  { stroke: #5DCAA5; }
    }
    @media (prefers-color-scheme: light) {
      .panel-hd  { fill: #1a1a1a; }
      .frame     { fill: none; stroke: #D3D1C7; }
      .sub-lbl   { fill: #5f5e5a; }
      .divider   { stroke: #D3D1C7; }
      .sum-box   { fill: none; stroke: #D3D1C7; }
      .sum-hd    { fill: #1a1a1a; }
      .sum-txt   { fill: #5f5e5a; }
      .arr-neu   { stroke: #B4B2A9; }
      .exc-fill  { fill: rgba(40,100,200,0.10); stroke: #2864C8; }
      .exc-lbl   { fill: #2864C8; }
      .sted-fill { fill: rgba(200,50,50,0.12); stroke: #C83232; }
      .sted-zero { fill: rgba(0,0,0,0); }
      .sted-lbl  { fill: #C83232; }
      .eff-fill  { fill: rgba(15,110,86,0.15); stroke: #0F6E56; }
      .eff-lbl   { fill: #0F6E56; }
      .fl-on     { fill: #2864C8; }
      .fl-off    { fill: #888780; }
      .fl-dep    { fill: #C83232; }
      .arrow-proc { stroke: #888780; }
      .energy-bg { fill: rgba(0,0,0,0.02); stroke: #D3D1C7; }
      .level-s0  { stroke: #0F6E56; }
      .level-s1  { stroke: #2864C8; }
      .level-vib { stroke: #D3D1C7; }
      .state-lbl { fill: #888780; }
      .trnx-exc  { stroke: #2864C8; }
      .trnx-sted { stroke: #C83232; }
      .trnx-flu  { stroke: #0F6E56; }
    }
    .hd  { font: 600 13px "Helvetica Neue", Arial, sans-serif; }
    .lbl { font: 500 12px "Helvetica Neue", Arial, sans-serif; }
    .sub { font: 400 11px "Helvetica Neue", Arial, sans-serif; }
    .mono{ font: 400 11px "JetBrains Mono", "Courier New", monospace; }
  </style>
  <marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- Radial gradient for STED doughnut -->
  <radialGradient id="donut-dark" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#E24B4A" stop-opacity="0"/>
    <stop offset="40%"  stop-color="#E24B4A" stop-opacity="0"/>
    <stop offset="60%"  stop-color="#E24B4A" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#E24B4A" stop-opacity="0.15"/>
  </radialGradient>
  <radialGradient id="donut-light" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#C83232" stop-opacity="0"/>
    <stop offset="40%"  stop-color="#C83232" stop-opacity="0"/>
    <stop offset="60%"  stop-color="#C83232" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#C83232" stop-opacity="0.10"/>
  </radialGradient>
</defs>

<!-- TITLE -->
<text class="hd panel-hd" x="340" y="22" text-anchor="middle">STED Microscopy — Principle</text>

<!-- ══════════════════════════════════
     THREE BEAM PANELS  y=35–230
     Each panel: 180 wide  (col centres: 100, 340, 580)
     ════════════════════════════════ -->

<!-- ─── Panel A: Excitation beam (Gaussian PSF) ─── -->
<rect x="20" y="32" width="193" height="198" rx="5" class="frame" stroke-width="0.5"/>
<text class="lbl sub-lbl" x="116" y="50" text-anchor="middle">① Excitation beam</text>

<!-- Gaussian spot -->
<ellipse cx="116" cy="135" rx="52" ry="39" class="exc-fill" stroke-width="0" opacity="0.4"/>
<ellipse cx="116" cy="135" rx="36" ry="27" class="exc-fill" stroke-width="0" opacity="0.6"/>
<ellipse cx="116" cy="135" rx="20" ry="15" class="exc-fill" stroke-width="1"/>
<circle  cx="116" cy="135" r="4"  class="fl-on"/>

<text class="sub exc-lbl" x="116" y="215" text-anchor="middle">diffraction-limited spot</text>
<text class="mono sub-lbl" x="116" y="228" text-anchor="middle">FWHM ~200–250 nm</text>

<!-- ─── Panel B: STED doughnut ─── -->
<rect x="243" y="32" width="193" height="198" rx="5" class="frame" stroke-width="0.5"/>
<text class="lbl sub-lbl" x="339" y="50" text-anchor="middle">② STED depletion beam</text>

<!-- Doughnut shape: outer filled ring with empty centre -->
<circle cx="339" cy="135" r="60" fill="url(#donut-dark)" stroke="none"/>
<circle cx="339" cy="135" r="60" class="sted-fill" fill="none" stroke-width="1"/>
<!-- Dark centre zero-intensity node -->
<circle cx="339" cy="135" r="20" class="sted-zero" stroke-width="0"/>

<text class="sub sted-lbl" x="339" y="215" text-anchor="middle">toroidal "doughnut" profile</text>
<text class="sub sub-lbl"  x="339" y="228" text-anchor="middle">zero intensity at centre</text>

<!-- ─── Panel C: Effective PSF ─── -->
<rect x="466" y="32" width="193" height="198" rx="5" class="frame" stroke-width="0.5"/>
<text class="lbl sub-lbl" x="562" y="50" text-anchor="middle">③ Effective fluorescence</text>

<!-- Suppressed ring -->
<ellipse cx="562" cy="135" rx="60" ry="45" class="sted-fill" stroke-width="0.6" stroke-dasharray="3 2" opacity="0.35"/>
<!-- Tiny allowed PSF in centre -->
<ellipse cx="562" cy="135" rx="12" ry="9"  class="eff-fill" stroke-width="1.2"/>
<circle  cx="562" cy="135" r="3.5" class="fl-on"/>

<text class="sub eff-lbl" x="562" y="215" text-anchor="middle">sub-diffraction emission zone</text>
<text class="mono sub-lbl" x="562" y="228" text-anchor="middle">FWHM 20–50 nm</text>

<!-- Plus / equals signs between panels -->
<text class="hd sub-lbl" x="230" y="140" text-anchor="middle">+</text>
<text class="hd sub-lbl" x="453" y="140" text-anchor="middle">=</text>

<!-- ══════════════════════════════════
     ENERGY DIAGRAM   y=248–390
     ════════════════════════════════ -->
<rect x="20" y="246" width="380" height="158" rx="6" class="sum-box" stroke-width="0.5"/>
<text class="hd sum-hd" x="210" y="266" text-anchor="middle">Energy Level Diagram</text>

<!-- S0 ground state -->
<line x1="45" y1="375" x2="185" y2="375" class="level-s0" stroke-width="2"/>
<text class="sub state-lbl" x="40" y="379" text-anchor="end">S₀</text>
<!-- S1 excited state -->
<line x1="45" y1="300" x2="185" y2="300" class="level-s1" stroke-width="2"/>
<text class="sub state-lbl" x="40" y="304" text-anchor="end">S₁</text>
<!-- Vibrational sub-levels -->
<line x1="45" y1="315" x2="185" y2="315" class="level-vib" stroke-width="0.8" stroke-dasharray="2 2"/>
<line x1="45" y1="330" x2="185" y2="330" class="level-vib" stroke-width="0.8" stroke-dasharray="2 2"/>
<line x1="45" y1="359" x2="185" y2="359" class="level-vib" stroke-width="0.8" stroke-dasharray="2 2"/>

<!-- Transition arrows -->
<!-- Excitation upward -->
<line x1="90" y1="370" x2="90" y2="305" class="trnx-exc" stroke-width="2"
  marker-end="url(#arr-g)"/>
<text class="sub exc-lbl" x="74" y="338" text-anchor="middle">exc</text>

<!-- Spontaneous fluorescence (green) -->
<line x1="125" y1="305" x2="125" y2="362" class="trnx-flu" stroke-width="2" stroke-dasharray="4 2"
  marker-end="url(#arr-g)"/>
<text class="sub eff-lbl" x="145" y="335" text-anchor="start">fluor.</text>

<!-- STED stimulated emission (red) — fast downward -->
<line x1="160" y1="305" x2="160" y2="362" class="trnx-sted" stroke-width="2"
  marker-end="url(#arr-g)"/>
<text class="sub sted-lbl" x="175" y="335" text-anchor="start">STED</text>

<!-- ══════════════════════════════════
     RESOLUTION FORMULA   right  
     ════════════════════════════════ -->
<rect x="420" y="246" width="240" height="158" rx="6" class="sum-box" stroke-width="0.5"/>
<text class="hd sum-hd" x="540" y="266" text-anchor="middle">Resolution Formula</text>

<text class="mono sum-txt" x="540" y="298" text-anchor="middle">d_eff ≈</text>
<text class="mono eff-lbl" x="540" y="316" text-anchor="middle">λ</text>
<line x1="490" y1="320" x2="590" y2="320" class="divider" stroke-width="1"/>
<text class="mono eff-lbl" x="540" y="338" text-anchor="middle">2 · NA · √(1 + I_STED / I_s)</text>

<text class="sub sum-txt" x="540" y="362" text-anchor="middle">As I_STED ↑  →  d_eff ↓</text>
<text class="sub sum-txt" x="540" y="378" text-anchor="middle">No theoretical lower bound</text>
<text class="sub eff-lbl" x="540" y="394" text-anchor="middle">practical: 20–80 nm in cells</text>

</svg>
