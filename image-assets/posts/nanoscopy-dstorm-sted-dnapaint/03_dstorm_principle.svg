<svg width="100%" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .panel-hd  { fill: #e8e6de; }
      .frame     { fill: none; stroke: rgba(222,220,209,0.25); }
      .sub-lbl   { fill: #9c9a92; }
      .divider   { stroke: rgba(222,220,209,0.18); }
      .sum-box   { fill: none; stroke: rgba(222,220,209,0.2); }
      .sum-hd    { fill: #e8e6de; }
      .sum-txt   { fill: #9c9a92; }
      .bg-cell   { fill: rgba(222,220,209,0.04); }
      /* fluorophore ON — teal/cyan */
      .fl-on     { fill: #1D9E75; }
      .fl-on-glow{ fill: rgba(29,158,117,0.25); }
      .lbl-on    { fill: #1D9E75; }
      /* fluorophore OFF — muted */
      .fl-off    { fill: #3a3a38; stroke: rgba(222,220,209,0.2); }
      .lbl-off   { fill: #5f5e5a; }
      /* PSF halo */
      .psf-halo  { fill: rgba(29,158,117,0.15); }
      /* Localisation dot */
      .loc-dot   { fill: #1D9E75; }
      /* Buffer chemistry */
      .chem-mea  { fill: rgba(83,74,183,0.20); stroke: #7F77DD; }
      .chem-ox   { fill: rgba(226,75,74,0.15);  stroke: #E24B4A; }
      .lbl-mea   { fill: #AFA9EC; }
      .lbl-ox    { fill: #E24B4A; }
      /* arrows */
      .arr-proc  { stroke: #5f5e5a; }
      .arr-on    { stroke: #1D9E75; }
    }
    @media (prefers-color-scheme: light) {
      .panel-hd  { fill: #1a1a1a; }
      .frame     { fill: none; stroke: #D3D1C7; }
      .sub-lbl   { fill: #5f5e5a; }
      .divider   { stroke: #D3D1C7; }
      .sum-box   { fill: none; stroke: #D3D1C7; }
      .sum-hd    { fill: #1a1a1a; }
      .sum-txt   { fill: #5f5e5a; }
      .bg-cell   { fill: rgba(0,0,0,0.02); }
      .fl-on     { fill: #0F6E56; }
      .fl-on-glow{ fill: rgba(15,110,86,0.15); }
      .lbl-on    { fill: #0F6E56; }
      .fl-off    { fill: #e0ded6; stroke: #D3D1C7; }
      .lbl-off   { fill: #B4B2A9; }
      .psf-halo  { fill: rgba(15,110,86,0.10); }
      .loc-dot   { fill: #0F6E56; }
      .chem-mea  { fill: rgba(83,74,183,0.08); stroke: #534AB7; }
      .chem-ox   { fill: rgba(200,50,50,0.08);  stroke: #C83232; }
      .lbl-mea   { fill: #534AB7; }
      .lbl-ox    { fill: #C83232; }
      .arr-proc  { stroke: #B4B2A9; }
      .arr-on    { stroke: #0F6E56; }
    }
    .hd  { font: 600 13px "Helvetica Neue", Arial, sans-serif; }
    .lbl { font: 500 12px "Helvetica Neue", Arial, sans-serif; }
    .sub { font: 400 11px "Helvetica Neue", Arial, sans-serif; }
    .mono{ font: 400 11px "JetBrains Mono", "Courier New", monospace; }
  </style>
  <marker id="arr-p" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text class="hd panel-hd" x="340" y="22" text-anchor="middle">dSTORM — Stochastic Single-Molecule Localisation</text>

<!-- ══════════════════════════════════
     TOP ROW: Three frames showing sparse blinking
     ════════════════════════════════ -->

<!-- Frame labels -->
<text class="sub sub-lbl" x="340" y="42" text-anchor="middle">Camera records 10,000–50,000 frames — only sparse subsets of molecules emit per frame</text>

<!-- Frame 1 -->
<rect x="20" y="50" width="186" height="130" rx="4" class="frame" stroke-width="0.5"/>
<rect x="20" y="50" width="186" height="130" rx="4" class="bg-cell" stroke-width="0"/>
<text class="sub sub-lbl" x="113" y="66" text-anchor="middle">Frame 1</text>
<!-- OFF molecules (grey dots) -->
<circle cx="55"  cy="110" r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="90"  cy="85"  r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="135" cy="125" r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="170" cy="95"  r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="75"  cy="145" r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="155" cy="150" r="5" class="fl-off" stroke-width="0.8"/>
<!-- ONE ON molecule with PSF halo -->
<circle cx="112" cy="108" r="22" class="psf-halo"/>
<circle cx="112" cy="108" r="6"  class="fl-on"/>
<text class="sub lbl-on" x="113" y="172" text-anchor="middle">1 molecule ON → fit Gaussian</text>

<!-- Frame 2 -->
<rect x="247" y="50" width="186" height="130" rx="4" class="frame" stroke-width="0.5"/>
<rect x="247" y="50" width="186" height="130" rx="4" class="bg-cell" stroke-width="0"/>
<text class="sub sub-lbl" x="340" y="66" text-anchor="middle">Frame 2</text>
<circle cx="282" cy="110" r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="317" cy="85"  r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="362" cy="125" r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="302" cy="145" r="5" class="fl-off" stroke-width="0.8"/>
<circle cx="382" cy="95"  r="5" class="fl-off" stroke-width="0.8"/>
<!-- TWO ON molecules -->
<circle cx="262" cy="90"  r="20" class="psf-halo"/>
<circle cx="262" cy="90"  r="6"  class="fl-on"/>
<circle cx="370" cy="148" r="20" class="psf-halo"/>
<circle cx="370" cy="148" r="6"  class="fl-on"/>
<text class="sub lbl-on" x="340" y="172" text-anchor="middle">2 molecules ON → 2 positions</text>

<!-- Frame 3: reconstructed -->
<rect x="474" y="50" width="186" height="130" rx="4" class="frame" stroke-width="0.5"/>
<rect x="474" y="50" width="186" height="130" rx="4" class="bg-cell" stroke-width="0"/>
<text class="sub sub-lbl" x="567" y="66" text-anchor="middle">After 30,000 frames</text>
<!-- Dense localisation map - many small dots -->
<circle cx="509" cy="100" r="2.5" class="loc-dot" opacity="0.9"/>
<circle cx="515" cy="105" r="2"   class="loc-dot" opacity="0.7"/>
<circle cx="511" cy="112" r="2.5" class="loc-dot" opacity="0.8"/>
<circle cx="530" cy="90"  r="2"   class="loc-dot" opacity="0.6"/>
<circle cx="525" cy="98"  r="2.5" class="loc-dot" opacity="0.9"/>
<circle cx="540" cy="80"  r="2"   class="loc-dot" opacity="0.7"/>
<circle cx="545" cy="88"  r="2.5" class="loc-dot" opacity="0.85"/>
<circle cx="538" cy="95"  r="2"   class="loc-dot" opacity="0.65"/>
<circle cx="555" cy="75"  r="2.5" class="loc-dot" opacity="0.9"/>
<circle cx="560" cy="83"  r="2"   class="loc-dot" opacity="0.7"/>
<circle cx="552" cy="92"  r="2.5" class="loc-dot" opacity="0.8"/>
<circle cx="570" cy="100" r="2"   class="loc-dot" opacity="0.6"/>
<circle cx="575" cy="108" r="2.5" class="loc-dot" opacity="0.9"/>
<circle cx="565" cy="115" r="2"   class="loc-dot" opacity="0.7"/>
<circle cx="580" cy="85"  r="2.5" class="loc-dot" opacity="0.8"/>
<circle cx="586" cy="93"  r="2"   class="loc-dot" opacity="0.65"/>
<circle cx="592" cy="78"  r="2.5" class="loc-dot" opacity="0.9"/>
<circle cx="598" cy="120" r="2"   class="loc-dot" opacity="0.7"/>
<circle cx="520" cy="130" r="2.5" class="loc-dot" opacity="0.85"/>
<circle cx="528" cy="138" r="2"   class="loc-dot" opacity="0.7"/>
<circle cx="535" cy="144" r="2.5" class="loc-dot" opacity="0.9"/>
<circle cx="544" cy="135" r="2"   class="loc-dot" opacity="0.6"/>
<circle cx="550" cy="125" r="2.5" class="loc-dot" opacity="0.8"/>
<circle cx="558" cy="133" r="2"   class="loc-dot" opacity="0.7"/>
<circle cx="567" cy="140" r="2.5" class="loc-dot" opacity="0.9"/>
<circle cx="575" cy="148" r="2"   class="loc-dot" opacity="0.65"/>
<circle cx="583" cy="130" r="2.5" class="loc-dot" opacity="0.8"/>
<circle cx="590" cy="138" r="2"   class="loc-dot" opacity="0.7"/>
<text class="sub lbl-on" x="567" y="172" text-anchor="middle">Super-resolution image ~20–50 nm</text>

<!-- Arrows between frames -->
<line x1="209" y1="115" x2="244" y2="115" class="arr-proc" stroke-width="1.2"
  marker-end="url(#arr-p)"/>
<line x1="436" y1="115" x2="471" y2="115" class="arr-proc" stroke-width="1.2"
  marker-end="url(#arr-p)"/>

<!-- ══════════════════════════════════
     MIDDLE: Localisation precision schematic
     ════════════════════════════════ -->
<rect x="20" y="188" width="300" height="130" rx="5" class="sum-box" stroke-width="0.5"/>
<text class="hd sum-hd" x="170" y="208" text-anchor="middle">Localisation Precision</text>

<!-- Gaussian fit illustration -->
<!-- PSF blob -->
<ellipse cx="110" cy="268" rx="46" ry="35" opacity="0.18" class="fl-on-glow"/>
<ellipse cx="110" cy="268" rx="26" ry="20" opacity="0.30" class="fl-on-glow"/>
<ellipse cx="110" cy="268" rx="12" ry="9"  class="frame" stroke-width="0.8" stroke-dasharray="3 2"/>
<circle  cx="110" cy="268" r="3"   class="loc-dot"/>

<!-- Precision annotation -->
<line x1="100" y1="268" x2="70" y2="250" class="arr-proc" stroke-width="0.8"
  marker-end="url(#arr-p)"/>
<text class="sub lbl-on" x="65" y="245" text-anchor="end">localised</text>
<text class="sub lbl-on" x="65" y="257" text-anchor="end">position</text>

<!-- Formula -->
<text class="mono sum-txt" x="215" y="248" text-anchor="middle">σ ≈ s / √N</text>
<text class="sub sub-lbl"  x="215" y="265" text-anchor="middle">s = PSF std dev (~130 nm)</text>
<text class="sub sub-lbl"  x="215" y="280" text-anchor="middle">N = detected photons</text>
<text class="sub lbl-on"   x="215" y="298" text-anchor="middle">1000–5000 photons → 10–30 nm</text>

<!-- ══════════════════════════════════
     MIDDLE RIGHT: Photoswitching buffer chemistry
     ════════════════════════════════ -->
<rect x="340" y="188" width="320" height="130" rx="5" class="sum-box" stroke-width="0.5"/>
<text class="hd sum-hd" x="500" y="208" text-anchor="middle">Photoswitching Buffer</text>

<!-- MEA box -->
<rect x="358" y="218" width="130" height="36" rx="4" class="chem-mea" stroke-width="0.8"/>
<text class="lbl lbl-mea" x="423" y="232" text-anchor="middle">MEA (50–100 mM)</text>
<text class="sub lbl-mea" x="423" y="247" text-anchor="middle">thiol reducing agent</text>

<!-- Glucose oxidase box -->
<rect x="502" y="218" width="140" height="36" rx="4" class="chem-ox" stroke-width="0.8"/>
<text class="lbl lbl-ox"  x="572" y="232" text-anchor="middle">Glucose oxidase</text>
<text class="sub lbl-ox"  x="572" y="247" text-anchor="middle">+ catalase (O₂ scavenger)</text>

<!-- Mechanism description -->
<text class="sub sub-lbl" x="500" y="276" text-anchor="middle">MEA reacts with excited triplet → dark thiol-adduct</text>
<text class="sub sub-lbl" x="500" y="291" text-anchor="middle">reverts spontaneously (10s–100s ms) → ON state</text>
<text class="sub sub-lbl" x="500" y="306" text-anchor="middle">O₂ scavenger prolongs dark state, reduces bleaching</text>

<!-- ══════════════════════════════════
     BOTTOM: Acquisition summary
     ════════════════════════════════ -->
<rect x="20" y="332" width="640" height="80" rx="6" class="sum-box" stroke-width="0.5"/>
<text class="hd sum-hd" x="340" y="352" text-anchor="middle">Typical dSTORM Acquisition</text>
<line x1="40" y1="358" x2="640" y2="358" class="divider" stroke-width="0.5"/>

<!-- Four stats -->
<text class="mono lbl-on"  x="120" y="376" text-anchor="middle">10,000–50,000</text>
<text class="sub sub-lbl"  x="120" y="391" text-anchor="middle">camera frames</text>

<line x1="240" y1="360" x2="240" y2="400" class="divider" stroke-width="0.5" stroke-dasharray="3 2"/>

<text class="mono lbl-on"  x="340" y="376" text-anchor="middle">10⁵ – 10⁷</text>
<text class="sub sub-lbl"  x="340" y="391" text-anchor="middle">localisations</text>

<line x1="440" y1="360" x2="440" y2="400" class="divider" stroke-width="0.5" stroke-dasharray="3 2"/>

<text class="mono lbl-on"  x="560" y="376" text-anchor="middle">20–50 nm</text>
<text class="sub sub-lbl"  x="560" y="391" text-anchor="middle">effective resolution</text>

<!-- ══════════════════════════════════
     Photoswitching cycle diagram (bottom)
     ════════════════════════════════ -->
<rect x="20" y="424" width="640" height="52" rx="6" class="sum-box" stroke-width="0.5"/>
<text class="sub sub-lbl" x="80"  y="444" text-anchor="middle">Fluorescent (ON)</text>
<circle cx="80" cy="458" r="8" class="fl-on"/>

<!-- arrow ON→OFF -->
<line x1="100" y1="458" x2="190" y2="458" class="arr-proc" stroke-width="1.2"
  marker-end="url(#arr-p)"/>
<text class="sub sub-lbl" x="145" y="452" text-anchor="middle">647 nm laser</text>
<text class="sub sub-lbl" x="145" y="464" text-anchor="middle">+ MEA triplet quench</text>

<text class="sub lbl-off" x="255" y="444" text-anchor="middle">Dark (OFF)</text>
<circle cx="255" cy="458" r="8" class="fl-off" stroke-width="1"/>

<!-- arrow OFF→ON -->
<line x1="275" y1="458" x2="365" y2="458" class="arr-on" stroke-width="1.2"
  marker-end="url(#arr-p)"/>
<text class="sub lbl-on" x="320" y="452" text-anchor="middle">spontaneous</text>
<text class="sub lbl-on" x="320" y="464" text-anchor="middle">reversion</text>

<text class="sub lbl-on" x="430" y="444" text-anchor="middle">Fluorescent (ON)</text>
<circle cx="430" cy="458" r="8" class="fl-on"/>

<!-- arrow repeats -->
<line x1="450" y1="458" x2="530" y2="458" class="arr-proc" stroke-width="1.2"
  marker-end="url(#arr-p)"/>
<text class="sub sub-lbl" x="490" y="452" text-anchor="middle">cycle repeats</text>
<text class="sub sub-lbl" x="490" y="464" text-anchor="middle">100s–1000s times</text>

<!-- Bleached end state -->
<text class="sub lbl-off" x="595" y="444" text-anchor="middle">Bleached</text>
<circle cx="595" cy="458" r="8" class="fl-off" stroke-width="1"/>
<line x1="584" y1="450" x2="606" y2="466" class="lbl-off" stroke-width="1.5"/>
<line x1="606" y1="450" x2="584" y2="466" class="lbl-off" stroke-width="1.5"/>

</svg>
